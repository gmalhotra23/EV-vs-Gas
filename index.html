// ── Era matching ──────────────────────────────────────────────────────────────
function findEra(make, model, year) {
  if (!make || !model || !DB[make] || !DB[make][model]) return "";
  const y = parseInt(year);
  const eras = Object.keys(DB[make][model]);
  for (const e of eras) {
    const [lo, hi] = e.split("-");
    const hiNum = hi === "+" ? 9999 : parseInt(hi);
    if (y >= parseInt(lo) && y <= hiNum) return e;
  }
  return eras[eras.length - 1] || "";
}

// ── Efficiency math ───────────────────────────────────────────────────────────
function evMult({tempF, terrain, traffic, weather}) {
  let m = 1.0, factors = [];
  const t = parseFloat(tempF);
  if (!isNaN(t)) {
    if (t < 20)      { m *= 0.60; factors.push("Extreme cold (<20°F): -40% range"); }
    else if (t < 32) { m *= 0.72; factors.push("Freezing (20-32°F): -28% range"); }
    else if (t < 45) { m *= 0.85; factors.push("Cold (32-45°F): -15% range"); }
    else if (t > 95) { m *= 0.88; factors.push("Extreme heat (>95°F): -12% range"); }
    else if (t > 80) { m *= 0.93; factors.push("High heat (80-95°F): -7% range"); }
  }
  if (terrain === "Hilly")       { m *= 0.88; factors.push("Hilly terrain: -12%"); }
  else if (terrain === "Mountainous") { m *= 0.78; factors.push("Mountain terrain: -22%"); }
  if (traffic === "Heavy")       { m *= 0.92; factors.push("Heavy traffic: -8%"); }
  else if (traffic === "Light")  { m *= 1.02; factors.push("Light traffic: +2%"); }
  if (weather === "Rain/Snow")   { m *= 0.90; factors.push("Rain/Snow: -10%"); }
  else if (weather === "Strong Headwind") { m *= 0.84; factors.push("Headwind: -16%"); }
  else if (weather === "Tailwind") { m *= 1.06; factors.push("Tailwind: +6%"); }
  return { mult: Math.min(m, 1.10), factors };
}

function gasMult({terrain, traffic, weather}) {
  let m = 1.0, factors = [];
  if (terrain === "Hilly")       { m *= 0.88; factors.push("Hilly terrain: -12% MPG"); }
  else if (terrain === "Mountainous") { m *= 0.78; factors.push("Mountain terrain: -22% MPG"); }
  if (traffic === "Heavy")       { m *= 0.72; factors.push("Heavy traffic: -28% MPG"); }
  else if (traffic === "Moderate") { m *= 0.88; factors.push("Moderate traffic: -12% MPG"); }
  if (weather === "Strong Headwind") { m *= 0.90; factors.push("Headwind: -10%"); }
  else if (weather === "Rain/Snow")  { m *= 0.94; factors.push("Rain/Snow: -6%"); }
  else if (weather === "Tailwind")   { m *= 1.04; factors.push("Tailwind: +4%"); }
  return { mult: m, factors };
}

function gasPrice(zip, grade) {
  const p = parseInt((zip||"50000").substring(0,3));
  let r,m,pr,src;
  if(p>=900&&p<=961){r=4.65;m=4.88;pr=5.10;src="CA avg";}
  else if(p>=970&&p<=979){r=4.20;m=4.43;pr=4.65;src="OR/WA avg";}
  else if(p>=100&&p<=149){r=3.95;m=4.18;pr=4.40;src="NY avg";}
  else if(p>=600&&p<=629){r=3.75;m=3.98;pr=4.20;src="IL avg";}
  else if(p>=770&&p<=799){r=3.10;m=3.33;pr=3.55;src="TX avg";}
  else if(p>=300&&p<=319){r=3.25;m=3.48;pr=3.70;src="GA/FL avg";}

  else{r=3.45;m=3.68;pr=3.90;src="national avg";}

// ── Address autocomplete ──────────────────────────────────────────────────────
function AddrInput({placeholder, value, onChange, onSelect}) {
  const [sug, setSug] = useState([]);
  const [open, setOpen] = useState(false);
  const [busy, setBusy] = useState(false);
  const tmr = useRef(null);
  const ref = useRef(null);

  useEffect(() => {
    const h = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", h);
    return () => document.removeEventListener("mousedown", h);
  }, []);

  function handleChange(v) {
    onChange(v);
    clearTimeout(tmr.current);
    if (v.length < 4) { setSug([]); setOpen(false); return; }
    tmr.current = setTimeout(async () => {
      setBusy(true);
      try {
        const r = await fetch(`https://nominatim.openstreetmap.org/search?format=json&limit=5&q=${encodeURIComponent(v)}&countrycodes=us`);
        const d = await r.json();
        setSug(d.map(x => ({label: x.display_name, lat: x.lat, lon: x.lon})));
        setOpen(d.length > 0);
      } catch { setSug([]); }
      setBusy(false);
    }, 400);
  }

  function pick(s) { onChange(s.label); onSelect && onSelect(s); setSug([]); setOpen(false); }

  return (
    <div ref={ref} style={{position:"relative"}}>
      <div style={{position:"relative"}}>
        <input value={value} onChange={e=>handleChange(e.target.value)} placeholder={placeholder} style={IS}/>
        {busy && <span className="spin" style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",fontSize:14,color:"#4f8ef7"}}>↻</span>}
      </div>
      {open && sug.length > 0 && (
        <div style={{position:"absolute",top:"100%",left:0,right:0,background:"#1a1d2e",border:"1px solid #2a2d3e",borderRadius:8,zIndex:999,maxHeight:200,overflowY:"auto",marginTop:2,boxShadow:"0 8px 24px rgba(0,0,0,0.5)"}}>
          {sug.map((s,i) => (
            <div key={i} className="aci" onMouseDown={()=>pick(s)} style={{padding:"9px 14px",cursor:"pointer",fontSize:12,color:"#c9cdd8",borderBottom:i<sug.length-1?"1px solid #2a2d3e":"none"}}>
              📍 {s.label.length > 70 ? s.label.substring(0,70)+"…" : s.label}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

  function handleYear(v)  { setYear(v); setTrim(""); if (make && model) setEra(findEra(make, model, v) || ""); }
  function handleEra(v)   { setEra(v); setTrim(""); }
  function handleTrim(v)  {
    setTrim(v);
    const currentEra = era || findEra(make, model, year);

        <div style={{marginTop:8}}>

          <Lbl>Trim / Engine</Lbl>

// ── Savings Chart ─────────────────────────────────────────────────────────────
function SavingsChart({carResults, annualTrips, period}) {
  const mult = period === "monthly" ? annualTrips / 12 : annualTrips;
  const data = carResults.map(r => ({
    name: r.car.name, type: r.type,
    total: (r.type==="gas" ? r.tripCost : r.tripHome) * mult,
    model: `${r.car.year} ${r.car.make} ${r.car.model}`
  }));
  const minCost = Math.min(...data.map(d=>d.total));
  const maxCost = Math.max(...data.map(d=>d.total));
  const icon = period==="monthly" ? "📅" : "📆";
  const title = period==="monthly" ? "Monthly Cost" : "Annual Cost";
  const sub = period==="monthly" ? `${(annualTrips/12).toFixed(1)} trips/mo` : `${annualTrips} trips/yr`;

  return (
    <div style={{background:"#1a1d2e",borderRadius:12,padding:20,border:"1px solid #2a2d3e"}}>
      <div style={{fontSize:14,fontWeight:700,marginBottom:3}}>{icon} {title}</div>
      <div style={{fontSize:11,color:"#6b7280",marginBottom:16}}>{sub} · cheapest = baseline</div>
      {data.map((d,i) => {
        const isBase = Math.abs(d.total - minCost) < 0.01;
        const extra  = d.total - minCost;
        const color  = isBase ? "#22c55e" : d.type==="ev" ? "#4f8ef7" : "#fb923c";
        const pct    = maxCost > 0 ? (d.total / maxCost) * 100 : 0;
        return (
          <div key={i} style={{marginBottom:16}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
              <div>
                <span style={{fontWeight:600,fontSize:12,color}}>{d.name}</span>
                <span style={{fontSize:10,color:"#6b7280",marginLeft:6}}>{d.model}</span>
              </div>
              <div style={{textAlign:"right"}}>
                <span style={{fontWeight:700,fontSize:13}}>${d.total.toFixed(0)}</span>
                {!isBase && extra > 0 && <span style={{fontSize:10,color:"#ef4444",marginLeft:5}}>+${extra.toFixed(0)}</span>}
                {isBase && <span style={{fontSize:10,color:"#22c55e",marginLeft:5}}>⭐ cheapest</span>}
              </div>
            </div>
            <div style={{height:26,background:"#0f1117",borderRadius:5,overflow:"hidden"}}>
              <div style={{height:"100%",width:`${pct}%`,background:color,borderRadius:5,minWidth:4,transition:"width 0.4s",display:"flex",alignItems:"center",paddingLeft:8}}>
                {pct > 28 && <span style={{fontSize:10,fontWeight:600,color:"#fff",whiteSpace:"nowrap"}}>{d.type==="ev" ? "⚡ EV" : "⛽ Gas"}</span>}
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

  const [breakdown, setBreakdown] = useState(null);
  const [aiText, setAiText] = useState("");
  const [aiLoading, setAiLoading] = useState(false);

  useEffect(() => {
    try { localStorage.setItem("tc5", JSON.stringify(garage)); } catch {}
  }, [garage]);

  // Auto-route calculation
  useEffect(() => {
    const coords = [originCoord, ...stops.map(s=>s.coord), destCoord].filter(Boolean);
    if (coords.length < 2) return;
    setRouteLoading(true);
    (async () => {
      try {
        const wpts = coords.map(c=>`${c.lon},${c.lat}`).join(";");
        const r = await fetch(`https://router.project-osrm.org/route/v1/driving/${wpts}?overview=false`);
        const d = await r.json();
        if (d.routes?.[0]) {
          const mi = d.routes[0].distance / 1609.344;
          setMiles((roundTrip ? mi * 2 : mi).toFixed(1));
        }
      } catch {}
      setRouteLoading(false);
    })();
  }, [originCoord, destCoord, stops, roundTrip]);

  const allAddrs = [origin, dest, ...stops.map(s=>s.value)].filter(Boolean);
  const detectedZip = allAddrs.map(extractZip).find(Boolean) || "";
  const terrain = guessTerrain(allAddrs);
  const sd = SEASON_DEFAULTS[season] || {tempF:72, weather:"Clear"};
  const effTemp = tempOverride || sd.tempF;
  const effWeather = weatherOverride || sd.weather;
  const annualTrips = tripsPerWeek ? Math.round(parseFloat(tripsPerWeek) * 52) : null;

  function toggleCar(id) { setSelected(p => p.includes(id) ? p.filter(x=>x!==id) : [...p,id]); }

  function saveCar() {
    if (!addSpec || !addNick) return;
    const car = {
      id: Date.now(),
      name: addNick,
      fuelLevel: parseFloat(addFuel) || 100,
      gasGrade: addSpec.type === "gas" ? addGrade : undefined,
      realMpg: addRealMpg ? parseFloat(addRealMpg) : null,
      ...addSpec
    };
    setGarage(p => [...p, car]);
    setShowAdd(false);
    setAddSpec(null); setAddNick(""); setAddFuel(100); setAddGrade("regular"); setAddRealMpg("");
  }

  function calculate() {
    if (!miles || selected.length === 0) return;
    const dist = parseFloat(miles);
    const zip = detectedZip;
    const evM = evMult({tempF: effTemp, terrain, traffic, weather: effWeather});
    const gasM = gasMult({terrain, traffic, weather: effWeather});
    const evRates = evPrice(zip);

    const carResults = selected.map(id => {
      const car = garage.find(c => c.id === id);
      if (!car) return null;

      if (car.type === "gas") {
        const grade = car.gasGrade || car.grade || "regular";
        const gp = gasPrice(zip, grade);
        const baseMpg = car.realMpg || car.mpg;
        const effMpg = baseMpg * gasM.mult;
        const gal = dist / effMpg;
        const curGal = (car.fuelLevel / 100) * (car.tank || 15);
        const short = Math.max(0, gal - curGal);
        const tripCost = gal * gp.active;
        const cpm = tripCost / dist;
        const annual = annualTrips ? tripCost * annualTrips : null;
        return {car, type:"gas", effMpg:effMpg.toFixed(1), baseMpg, gal:gal.toFixed(2),
          short:short.toFixed(2), stopNeeded:short>0, tripCost, cpm, annual,
          gp, evRates, grade, factors:gasM.factors,
          epaNote:`EPA: ${car.mpg} MPG${car.realMpg ? ` · Your real-world: ${car.realMpg} MPG` : ""}`,
          adjPct:((gasM.mult-1)*100).toFixed(0)};
      } else {
        const adjRange = (car.range || 250) * evM.mult;
        const kwh = dist / ((car.efficiency || 3.2) * evM.mult);
        const curKwh = (car.fuelLevel / 100) * (car.battery || 75);
        const short = Math.max(0, kwh - curKwh);
        const chStops = short > 0 ? Math.ceil(short / ((car.battery || 75) * 0.8)) : 0;
        const tripHome = kwh * evRates.home;
        const tripL2 = kwh * evRates.level2;
        const tripDC = kwh * evRates.dcFast;
        const cpm = tripHome / dist;
        const annual = annualTrips ? tripHome * annualTrips : null;
        return {car, type:"ev", adjRange:adjRange.toFixed(0), evM:evM.mult, kwh:kwh.toFixed(1),
          short:short.toFixed(1), stopNeeded:short>0, chargingStops:chStops,
          tripHome, tripL2, tripDC, cpm, annual, evRates, factors:evM.factors,
          epaNote:`EPA: ${car.range}mi range · Today adj: ${adjRange.toFixed(0)}mi`,
          adjPct:((evM.mult-1)*100).toFixed(0)};
      }
    }).filter(Boolean);

    setResults({carResults, dist, terrain, zip, effTemp, effWeather, traffic, annualTrips, roundTrip});
    setTab("results");
    fetchAI(carResults, dist);
  }

  async function fetchAI(carResults, dist) {
    setAiLoading(true); setAiText("");
    try {
      const summary = carResults.map(r => r.type==="gas"
        ? `${r.car.name} (${r.car.year} ${r.car.make} ${r.car.model}, gas): ${fmt$(r.tripCost)}/trip, ${r.effMpg}mpg effective`
        : `${r.car.name} (${r.car.year} ${r.car.make} ${r.car.model}, EV): ${fmt$(r.tripHome)}/trip home charging, ${r.adjRange}mi adj range`
      ).join("\n");
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({model:"claude-sonnet-4-6", max_tokens:700,
          system:"Concise automotive cost analyst. 2-3 short paragraphs max. No markdown or bullets. Use specific numbers.",
          messages:[{role:"user", content:`${dist} miles, ${season}, ${terrain} terrain, ${traffic} traffic, ${effWeather}, ${effTemp}F, ZIP ${detectedZip||"unknown"}.\n${summary}\nSharp comparison, EV caveats if relevant, one clear recommendation.`}]})
      });
      const d = await res.json();
      setAiText(d.content?.find(b=>b.type==="text")?.text || "");
    } catch { setAiText("AI analysis unavailable."); }
    setAiLoading(false);
  }

  const TABS = [["plan","📍 Plan Trip"],["garage",`🚗 Garage (${garage.length})`],["results","📊 Results"]];

  return (
    <div style={{minHeight:"100vh",background:"#0f1117"}}>
      {/* Header */}
      <div style={{background:"linear-gradient(135deg,#1a1d2e,#0f1117)",borderBottom:"1px solid #2a2d3e",padding:"24px 24px 0"}}>
        <div style={{maxWidth:980,margin:"0 auto"}}>
          <div style={{marginBottom:20}}>
            <div style={{fontSize:28,fontWeight:800,color:"#fff",letterSpacing:"-1px"}}><span style={{color:"#4f8ef7"}}>⚡</span> TripCost</div>
            <div style={{fontSize:13,color:"#6b7280",marginTop:3}}>Gas vs. EV · Real conditions · Real savings</div>
          </div>
          <div style={{display:"flex",gap:4}}>
            {TABS.map(([key,label]) => (
              <button key={key} onClick={()=>setTab(key)} style={{padding:"14px 28px",borderRadius:"10px 10px 0 0",border:"none",cursor:"pointer",fontSize:15,fontWeight:700,background:tab===key?"#0f1117":"#16192a",color:tab===key?"#4f8ef7":"#6b7280",borderTop:tab===key?"2px solid #4f8ef7":"2px solid transparent"}}>
                {label}
              </button>
            ))}
          </div>
        </div>
      </div>

      <div style={{maxWidth:980,margin:"0 auto",padding:"28px 16px"}}>

        {/* ─── PLAN ─────────────────────────────────────────────────────────── */}
        {tab==="plan" && (
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(300px,1fr))",gap:20}}>
            {/* Route */}
            <div style={{gridColumn:"1 / -1"}}>
              <Card>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
                  <div>
                    <div style={{fontSize:15,fontWeight:700}}>🗺️ Trip Route</div>
                    <div style={{fontSize:12,color:"#6b7280",marginTop:2}}>Type to see address suggestions</div>
                  </div>
                  <button onClick={()=>setRoundTrip(r=>!r)} style={{...BS,background:roundTrip?"#4f8ef7":"#1a2240",color:roundTrip?"#fff":"#4f8ef7",fontWeight:700,fontSize:12,border:`1px solid ${roundTrip?"#4f8ef7":"#2a2d3e"}`}}>
                    🔄 Round Trip {roundTrip?"ON":"OFF"}
                  </button>
                </div>

                <Lbl>Origin</Lbl>
                <AddrInput placeholder="e.g. 123 Main St, Chicago, IL 60601" value={origin} onChange={setOrigin} onSelect={s=>{setOrigin(s.label); setOriginCoord({lat:s.lat,lon:s.lon});}}/>

                {stops.map((stop,i) => (
                  <div key={stop.id} style={{display:"flex",gap:8,alignItems:"flex-end",marginTop:8}}>
                    <div style={{flex:1}}>
                      <Lbl>Stop {i+1}</Lbl>
                      <AddrInput placeholder="Enter stop address" value={stop.value} onChange={v=>setStops(p=>p.map(s=>s.id===stop.id?{...s,value:v}:s))} onSelect={s=>setStops(p=>p.map(x=>x.id===stop.id?{...x,value:s.label,coord:{lat:s.lat,lon:s.lon}}:x))}/>
                    </div>
                    <button onClick={()=>setStops(p=>p.filter(s=>s.id!==stop.id))} style={{...BS,background:"#3f1f1f",color:"#ef4444",padding:"9px 12px",marginBottom:1}}>✕</button>
                  </div>
                ))}

                <Lbl>Destination</Lbl>
                <AddrInput placeholder="e.g. 456 Oak Ave, Naperville, IL 60540" value={dest} onChange={setDest} onSelect={s=>{setDest(s.label); setDestCoord({lat:s.lat,lon:s.lon});}}/>

                <button onClick={()=>setStops(p=>[...p,{id:Date.now(),value:"",coord:null}])} style={{...BS,background:"#1a2240",color:"#4f8ef7",width:"100%",marginTop:10,fontWeight:600}}>+ Add Stop</button>

                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginTop:16}}>
                  <div>
                    <Lbl>Total Miles {routeLoading && <span className="spin" style={{color:"#4f8ef7",marginLeft:4}}>↻</span>} {roundTrip && <span style={{color:"#4f8ef7",fontWeight:400}}>(round trip)</span>}</Lbl>
                    <input type="number" placeholder={routeLoading?"Calculating…":"Auto-calculated or enter manually"} value={miles} onChange={e=>setMiles(e.target.value)} style={IS}/>
                  </div>
                  <div>
                    <Lbl>Trips per week <span style={{color:"#4b5563",fontWeight:400}}>(unlocks cost graphs)</span></Lbl>
                    <input type="number" placeholder="e.g. 5 for daily commute" value={tripsPerWeek} onChange={e=>setTripsPerWeek(e.target.value)} style={IS}/>
                  </div>
                </div>

                {allAddrs.length > 0 && (
                  <div style={{marginTop:14,display:"flex",flexWrap:"wrap",gap:4}}>
                    {detectedZip && <Chip color="#22c55e">📍 ZIP {detectedZip}</Chip>}
                    <Chip color="#4f8ef7">🏔️ {terrain}</Chip>
                    <Chip color="#f59e0b">🌡️ {effTemp}°F</Chip>
                    <Chip color="#9ca3af">☁️ {effWeather}</Chip>
                    {annualTrips && <Chip color="#a78bfa">📅 ~{annualTrips} trips/yr</Chip>}
                    {roundTrip && <Chip color="#4f8ef7">🔄 Round trip</Chip>}
                  </div>
                )}
              </Card>
            </div>

            {/* Conditions */}
            <Card>
              <div style={{fontSize:15,fontWeight:700,marginBottom:4}}>🌤️ Conditions</div>
              <div style={{fontSize:12,color:"#6b7280"}}>Season sets defaults — override if needed</div>
              <Lbl>Season</Lbl>
              <select value={season} onChange={e=>{setSeason(e.target.value);setTempOverride("");setWeatherOverride("");}} style={IS}>
                {SEASONS.map(s=><option key={s}>{s}</option>)}
              </select>
              <Lbl>Temp °F <span style={{color:"#4b5563",fontWeight:400}}>(default: {sd.tempF}°F)</span></Lbl>
              <input type="number" placeholder={`Default ${sd.tempF}°F`} value={tempOverride} onChange={e=>setTempOverride(e.target.value)} style={IS}/>
              <Lbl>Weather <span style={{color:"#4b5563",fontWeight:400}}>(default: {sd.weather})</span></Lbl>
              <select value={effWeather} onChange={e=>setWeatherOverride(e.target.value===sd.weather?"":e.target.value)} style={IS}>
                {WEATHER_OPTIONS.map(w=><option key={w}>{w}</option>)}
              </select>
              <Lbl>Traffic</Lbl>
              <select value={traffic} onChange={e=>setTraffic(e.target.value)} style={IS}>
                {TRAFFIC_OPTIONS.map(t=><option key={t}>{t}</option>)}
              </select>
            </Card>

            {/* Car selection */}
            <Card>
              <div style={{fontSize:15,fontWeight:700,marginBottom:4}}>🚗 Select Cars</div>
              <div style={{fontSize:12,color:"#6b7280",marginBottom:12}}>Tap to toggle for comparison</div>
              {garage.length === 0
                ? <div style={{textAlign:"center",padding:"28px 0",color:"#4b5563"}}>No cars yet — go to <b>Garage</b> to add vehicles.</div>
                : garage.map(car => (
                  <div key={car.id} onClick={()=>toggleCar(car.id)} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 14px",borderRadius:8,marginBottom:8,cursor:"pointer",background:selected.includes(car.id)?"#1a2240":"#16192a",border:`1px solid ${selected.includes(car.id)?"#4f8ef7":"#2a2d3e"}`,transition:"all 0.15s"}}>
                    <span style={{fontSize:18}}>{car.type==="ev"?"⚡":"⛽"}</span>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:600,fontSize:13}}>{car.name}</div>
                      <div style={{fontSize:11,color:"#9ca3af"}}>{car.year} {car.make} {car.model} · {car.fuelLevel}% {car.type==="ev"?"charge":"fuel"}</div>
                    </div>
                    <div style={{width:20,height:20,borderRadius:"50%",border:`2px solid ${selected.includes(car.id)?"#4f8ef7":"#4b5563"}`,background:selected.includes(car.id)?"#4f8ef7":"transparent",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:"#fff",flexShrink:0}}>
                      {selected.includes(car.id)?"✓":""}
                    </div>
                  </div>
                ))
              }
            </Card>

            {/* Calculate */}
            <div style={{gridColumn:"1 / -1"}}>
              <button onClick={calculate} disabled={!miles||selected.length===0} style={{width:"100%",padding:16,borderRadius:12,border:"none",cursor:(!miles||selected.length===0)?"not-allowed":"pointer",background:(!miles||selected.length===0)?"#1e2130":"linear-gradient(135deg,#4f8ef7,#7c3aed)",color:(!miles||selected.length===0)?"#4b5563":"#fff",fontSize:17,fontWeight:800}}>
                {!miles ? "Enter miles or pick addresses to auto-calculate" : selected.length===0 ? "Select at least one car from Garage" : "Calculate Trip Costs →"}
              </button>
            </div>
          </div>
        )}

        {/* ─── GARAGE ───────────────────────────────────────────────────────── */}
        {tab==="garage" && (
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
              <div>
                <div style={{fontSize:18,fontWeight:700}}>My Garage</div>
                <div style={{fontSize:13,color:"#6b7280"}}>Save vehicles for quick trip comparisons</div>
              </div>
              <button onClick={()=>setShowAdd(true)} style={{...BS,background:"#4f8ef7",color:"#fff",fontWeight:700,fontSize:14}}>+ Add Vehicle</button>
            </div>

            {garage.length === 0 && (
              <div style={{textAlign:"center",padding:"60px 0",color:"#4b5563"}}>
                <div style={{fontSize:52}}>🚗</div>
                <div style={{fontSize:16,fontWeight:700,marginTop:14,color:"#6b7280"}}>Garage is empty</div>
                <div style={{fontSize:13,marginTop:6}}>Add your vehicles to start comparing trips</div>
              </div>
            )}

            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(250px,1fr))",gap:16}}>
              {garage.map(car => (
                <Card key={car.id}>
                  <div style={{display:"flex",justifyContent:"space-between"}}>
                    <span style={{fontSize:28}}>{car.type==="ev"?"⚡":"⛽"}</span>
                    <button onClick={()=>setGarage(g=>g.filter(c=>c.id!==car.id))} style={{background:"none",border:"none",color:"#4b5563",cursor:"pointer",fontSize:18}}>✕</button>
                  </div>
                  <div style={{fontWeight:700,fontSize:15,marginTop:8}}>{car.name}</div>
                  <div style={{fontSize:11,color:"#9ca3af",marginBottom:12}}>{car.year} {car.make} {car.model}<br/>{car.trim}</div>
                  <Row label={car.type==="ev"?"EPA Range":"EPA MPG"} value={car.type==="ev"?`${car.range}mi`:`${car.mpg}mpg`}/>
                  {car.realMpg && <Row label="Real-world MPG" value={`${car.realMpg}mpg ✓`} bold/>}
                  {car.type==="gas" && <Row label="Fuel grade" value={GRADE_LABELS[car.gasGrade||car.grade||"regular"]}/>}
                  <Row label={car.type==="ev"?"Battery":"Tank"} value={car.type==="ev"?`${car.battery} kWh`:`${car.tank} gal`}/>
                  <Row label="Current level" value={`${car.fuelLevel}%`}/>
                  <div style={{marginTop:8,height:6,borderRadius:3,background:"#2a2d3e"}}>
                    <div style={{width:`${car.fuelLevel}%`,height:"100%",borderRadius:3,background:car.fuelLevel>50?"#22c55e":car.fuelLevel>25?"#fb923c":"#ef4444"}}/>
                  </div>
                </Card>
              ))}
            </div>

            {/* Add Car Modal */}
            {showAdd && (
              <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200}}>
                <div style={{background:"#1a1d2e",borderRadius:16,padding:28,width:"min(560px,94vw)",border:"1px solid #2a2d3e",maxHeight:"92vh",overflowY:"auto"}}>
                  <div style={{fontSize:17,fontWeight:700,marginBottom:20}}>Add Vehicle</div>

                  <CarPicker onSelect={s => { setAddSpec(s); setAddGrade(s.grade || "regular"); }}/>

                  <Lbl>Nickname</Lbl>
                  <input placeholder='e.g. "My Truck", "Wife&apos;s Tesla"' value={addNick} onChange={e=>setAddNick(e.target.value)} style={IS}/>

                  <Lbl>Current fuel / charge level (%)</Lbl>
                  <input type="number" min="0" max="100" value={addFuel} onChange={e=>setAddFuel(e.target.value)} style={IS}/>
                  <div style={{marginTop:6,height:6,borderRadius:3,background:"#2a2d3e"}}>
                    <div style={{width:`${Math.min(100,Math.max(0,addFuel))}%`,height:"100%",borderRadius:3,background:addFuel>50?"#22c55e":addFuel>25?"#fb923c":"#ef4444",transition:"width 0.2s"}}/>
                  </div>

                  {addSpec?.type==="gas" && (
                    <>
                      <Lbl>Gas grade <span style={{color:"#4b5563",fontWeight:400}}>(auto-set from trim)</span></Lbl>
                      <select value={addGrade} onChange={e=>setAddGrade(e.target.value)} style={IS}>
                        {Object.entries(GRADE_LABELS).map(([k,v])=><option key={k} value={k}>{v}</option>)}
                      </select>
                      <Lbl>Real-world MPG <span style={{color:"#4b5563",fontWeight:400}}>(optional — overrides EPA)</span></Lbl>
                      <input type="number" placeholder={`EPA: ${addSpec?.mpg}mpg — enter yours if you track it`} value={addRealMpg} onChange={e=>setAddRealMpg(e.target.value)} style={IS}/>
                    </>
                  )}

                  <div style={{display:"flex",gap:10,marginTop:20}}>
                    <button onClick={()=>{setShowAdd(false);setAddSpec(null);setAddNick("");setAddFuel(100);setAddGrade("regular");setAddRealMpg("");}} style={{...BS,flex:1,background:"#1e2130",color:"#9ca3af"}}>Cancel</button>
                    <button onClick={saveCar} disabled={!addSpec||!addNick} style={{...BS,flex:1,background:(!addSpec||!addNick)?"#1e2130":"#4f8ef7",color:(!addSpec||!addNick)?"#4b5563":"#fff",fontWeight:700}}>
                      {!addSpec ? "Pick a trim first" : !addNick ? "Add a nickname" : "Save Vehicle"}
                    </button>
                  </div>
                </div>
              </div>
            )}
          </div>
        )}

        {/* ─── RESULTS ──────────────────────────────────────────────────────── */}
        {tab==="results" && (
          <div>
            {!results ? (
              <div style={{textAlign:"center",padding:"60px 0",color:"#4b5563"}}>
                <div style={{fontSize:52}}>📊</div>
                <div style={{fontSize:16,fontWeight:700,marginTop:14,color:"#6b7280"}}>No results yet</div>
                <div style={{fontSize:13,marginTop:6}}>Plan a trip and hit Calculate</div>
              </div>
            ) : (
              <div>
                <div style={{marginBottom:20}}>
                  <div style={{fontSize:18,fontWeight:700}}>Trip Results {results.roundTrip?"(Round Trip)":""}</div>
                  <div style={{fontSize:13,color:"#6b7280",marginTop:3}}>
                    {results.dist}mi · {results.terrain} · {results.traffic} traffic · {results.effWeather} · {results.effTemp}°F{results.zip?` · ZIP ${results.zip}`:""}
                  </div>
                </div>

                {/* Car result cards */}
                <div style={{display:"grid",gridTemplateColumns:`repeat(${Math.min(results.carResults.length,3)},1fr)`,gap:16,marginBottom:20}}>
                  {results.carResults.map((r,i) => {
                    const cost = r.type==="gas" ? r.tripCost : r.tripHome;
                    const lowest = Math.min(...results.carResults.map(x=>x.type==="gas"?x.tripCost:x.tripHome));
                    const isWinner = results.carResults.length > 1 && Math.abs(cost-lowest) < 0.01;
                    return (
                      <div key={i} style={{background:isWinner?"linear-gradient(135deg,#1a2a1a,#111418)":"#1e2130",border:`1px solid ${isWinner?"#22c55e":"#2a2d3e"}`,borderRadius:14,padding:"18px 16px",position:"relative"}}>
                        {isWinner && <div style={{position:"absolute",top:-11,right:14,background:"#22c55e",color:"#000",fontSize:10,fontWeight:800,padding:"3px 10px",borderRadius:20}}>CHEAPEST</div>}
                        <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:10}}>
                          <span style={{fontSize:20}}>{r.type==="ev"?"⚡":"⛽"}</span>
                          <div>
                            <div style={{fontWeight:700,fontSize:14}}>{r.car.name}</div>
                            <div style={{fontSize:10,color:"#9ca3af"}}>{r.car.year} {r.car.make} {r.car.model} · {r.car.trim}</div>
                          </div>
                        </div>

                        <div style={{fontSize:36,fontWeight:800,letterSpacing:"-1.5px",color:isWinner?"#4ade80":"#fff",lineHeight:1}}>{fmt$(cost)}</div>
                        <div style={{fontSize:11,marginBottom:14,marginTop:3}}>
                          {r.type==="ev"
                            ? <span style={{color:"#4f8ef7",fontWeight:600}}>⚡ Home charging · {fmt$(r.evRates.home)}/kWh · {r.evRates.source}</span>
                            : <span style={{color:"#fb923c",fontWeight:600}}>⛽ {GRADE_LABELS[r.grade]||"Regular"} gas · {fmt$(r.gp.active)}/gal · {r.gp.source}</span>}
                        </div>

                        <Row label="Cost per mile" value={fmt$(r.cpm)} bold/>
                        {r.annual != null && <Row label={`Annual (${results.annualTrips} trips)`} value={`$${r.annual.toFixed(0)}`} bold/>}
                        <div style={{borderTop:"1px solid #2a2d3e",margin:"10px 0"}}/>

                        {r.type==="gas" && (
                          <>
                            <Row label="Effective MPG" value={`${r.effMpg}mpg`}/>
                            <Row label="Gallons needed" value={`${r.gal} gal`}/>
                            <Row label="Regular" value={`${fmt$(r.gp.regular)}/gal · ${fmt$(parseFloat(r.gal)*r.gp.regular)}`} sub/>
                            <Row label="Mid-Grade" value={`${fmt$(r.gp.midgrade)}/gal · ${fmt$(parseFloat(r.gal)*r.gp.midgrade)}`} sub/>
                            <Row label="Premium" value={`${fmt$(r.gp.premium)}/gal · ${fmt$(parseFloat(r.gal)*r.gp.premium)}`} sub/>
                            {/* Grade toggle */}
                            <div style={{marginTop:8,display:"flex",gap:4,flexWrap:"wrap"}}>
                              <span style={{fontSize:10,color:"#6b7280",alignSelf:"center"}}>Switch grade:</span>
                              {["regular","midgrade","premium"].map(g=>(
                                <button key={g} onClick={()=>{
                                  const upd = {...results};
                                  const cr = upd.carResults[i];
                                  cr.grade = g;
                                  cr.gp.active = cr.gp[g];
                                  cr.tripCost = parseFloat(cr.gal) * cr.gp[g];
                                  cr.cpm = cr.tripCost / results.dist;
                                  if (results.annualTrips) cr.annual = cr.tripCost * results.annualTrips;
                                  setResults({...upd});
                                }} style={{padding:"4px 8px",borderRadius:6,border:"none",cursor:"pointer",fontSize:10,fontWeight:700,background:r.grade===g?"#fb923c":"#1a1d2e",color:r.grade===g?"#000":"#9ca3af"}}>
                                  {GRADE_LABELS[g]}
                                </button>
                              ))}
                            </div>
                          </>
                        )}

                        {r.type==="ev" && (
                          <>
                            <Row label="Adj. range today" value={`${r.adjRange}mi`}/>
                            <Row label="Range adjustment" value={`${r.adjPct}%`} warn={r.evM<0.80}/>
                            <Row label="kWh needed" value={`${r.kwh} kWh`}/>
                            <Row label="Public L2" value={fmt$(r.tripL2)} sub/>
                            <Row label="DC Fast" value={fmt$(r.tripDC)} sub/>
                          </>
                        )}

                        {r.stopNeeded && (
                          <div style={{marginTop:10,padding:"9px 12px",background:"#2a1a00",borderRadius:8,color:"#fb923c",fontSize:12,fontWeight:600}}>
                            {r.type==="gas"
                              ? `⚠️ Need ~${r.short} more gal — gas stop required`
                              : `⚠️ Need ~${r.short} more kWh — ${r.chargingStops} charging stop(s) needed`}
                          </div>
                        )}

                        <button onClick={()=>setBreakdown(breakdown===i?null:i)} style={{...BS,width:"100%",marginTop:12,background:"#1a1d2e",color:"#6b7280",fontSize:11,border:"1px solid #2a2d3e"}}>
                          {breakdown===i?"▲ Hide breakdown":"▼ How we calculated this"}
                        </button>
                        {breakdown===i && (
                          <div style={{marginTop:10,padding:12,background:"#0f1117",borderRadius:8,fontSize:11}}>
                            <div style={{color:"#4f8ef7",fontWeight:700,marginBottom:8}}>📊 Accuracy Breakdown</div>
                            <div style={{color:"#9ca3af",marginBottom:8}}>{r.epaNote}</div>
                            {r.factors.length > 0
                              ? r.factors.map((f,fi)=><div key={fi} style={{color:"#6b7280",marginBottom:3}}>• {f}</div>)
                              : <div style={{color:"#6b7280"}}>• No significant adjustments from EPA baseline</div>}
                            <div style={{borderTop:"1px solid #2a2d3e",marginTop:8,paddingTop:8,color:parseFloat(r.adjPct)<0?"#ef4444":"#4ade80",fontWeight:600}}>
                              Net adjustment: {r.adjPct}% from EPA
                            </div>
                            {r.car.realMpg && <div style={{marginTop:4,color:"#4ade80",fontSize:10}}>✓ Using your real-world {r.car.realMpg}mpg</div>}
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>

                {/* Savings callout */}
                {results.carResults.length >= 2 && (() => {
                  const sorted = [...results.carResults].map(r=>({name:r.car.name,cost:r.type==="gas"?r.tripCost:r.tripHome,annual:r.annual})).sort((a,b)=>a.cost-b.cost);
                  const saved = sorted[sorted.length-1].cost - sorted[0].cost;
                  if (saved < 0.01) return null;
                  const annSaved = sorted[0].annual!=null && sorted[sorted.length-1].annual!=null ? sorted[sorted.length-1].annual-sorted[0].annual : null;
                  return (
                    <div style={{background:"linear-gradient(135deg,#1a2240,#0f1117)",border:"1px solid #4f8ef7",borderRadius:12,padding:"16px 20px",marginBottom:20,display:"flex",gap:24,flexWrap:"wrap",alignItems:"center"}}>
                      <div><div style={{fontSize:28,fontWeight:800,color:"#4f8ef7",letterSpacing:"-1px"}}>{fmt$(saved)}</div><div style={{fontSize:12,color:"#6b7280"}}>saved per trip with {sorted[0].name}</div></div>
                      {annSaved!=null && <div><div style={{fontSize:28,fontWeight:800,color:"#4f8ef7",letterSpacing:"-1px"}}>${annSaved.toFixed(0)}</div><div style={{fontSize:12,color:"#6b7280"}}>annual savings ({results.annualTrips} trips/yr)</div></div>}
                    </div>
                  );
                })()}

                {/* Savings graphs */}
                {results.annualTrips && results.carResults.length >= 1 && (
                  <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(280px,1fr))",gap:16,marginBottom:20}}>
                    <SavingsChart carResults={results.carResults} annualTrips={results.annualTrips} period="monthly"/>
                    <SavingsChart carResults={results.carResults} annualTrips={results.annualTrips} period="yearly"/>
                  </div>
                )}

                {/* AI */}
                <Card>
                  <div style={{fontSize:13,fontWeight:700,color:"#4f8ef7",marginBottom:10}}>⚡ AI Analysis</div>
                  {aiLoading
                    ? <div style={{color:"#6b7280",fontSize:13}}>Analyzing your trip…</div>
                    : <div style={{fontSize:13,lineHeight:1.75,color:"#c9cdd8",whiteSpace:"pre-wrap"}}>{aiText||"—"}</div>}
                </Card>
              </div>
            )}
          </div>
        )}
      </div>

      <div style={{textAlign:"center",padding:20,borderTop:"1px solid #1e2130",color:"#374151",fontSize:11}}>
        Estimates use EPA ratings adjusted for real-world conditions · Routing via OpenStreetMap · Gas prices are regional averages
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>

// ── Physics ───────────────────────────────────────────────────────────────────
function evRangeMult({ tempF, terrain, traffic, weather }) {
  let m = 1.0, factors = [];
  const t = parseFloat(tempF);
  if (!isNaN(t)) {
    if (t < 20) { m *= 0.60; factors.push("Extreme cold: −40% range"); }
    else if (t < 32) { m *= 0.72; factors.push("Freezing temps: −28% range"); }
    else if (t < 45) { m *= 0.85; factors.push("Cold temps: −15% range"); }
    else if (t > 95) { m *= 0.88; factors.push("Extreme heat: −12% range"); }
    else if (t > 80) { m *= 0.93; factors.push("High heat: −7% range"); }
  }
  if (terrain === "Hilly") { m *= 0.88; factors.push("Hilly terrain: −12%"); }
  else if (terrain === "Mountainous") { m *= 0.78; factors.push("Mountain terrain: −22%"); }
  if (traffic === "Heavy") { m *= 0.92; factors.push("Heavy traffic: −8% (less regen benefit at speed)"); }
  else if (traffic === "Light") { m *= 1.02; factors.push("Light traffic: +2%"); }
  if (weather === "Rain/Snow") { m *= 0.90; factors.push("Rain/Snow: −10%"); }
  else if (weather === "Strong Headwind") { m *= 0.84; factors.push("Headwind: −16%"); }
  else if (weather === "Tailwind") { m *= 1.06; factors.push("Tailwind: +6%"); }
  return { mult: Math.min(m, 1.10), factors };
}

function gasMpgMult({ terrain, traffic, weather }) {
  let m = 1.0, factors = [];
  if (terrain === "Hilly") { m *= 0.88; factors.push("Hilly terrain: −12% MPG"); }
  else if (terrain === "Mountainous") { m *= 0.78; factors.push("Mountain terrain: −22% MPG"); }
  if (traffic === "Heavy") { m *= 0.72; factors.push("Heavy traffic: −28% MPG"); }
  else if (traffic === "Moderate") { m *= 0.88; factors.push("Moderate traffic: −12% MPG"); }
  if (weather === "Strong Headwind") { m *= 0.90; factors.push("Headwind: −10% MPG"); }
  else if (weather === "Rain/Snow") { m *= 0.94; factors.push("Rain/Snow: −6% MPG"); }
  else if (weather === "Tailwind") { m *= 1.04; factors.push("Tailwind: +4% MPG"); }
  return { mult: m, factors };
}

const GRADE_LABELS = { regular:"Regular", midgrade:"Mid-Grade", premium:"Premium" };
function estimateGasPrice(zip, grade) {
  grade = grade || "regular";
  const p = parseInt((zip||"50000").substring(0,3));
  let r,m,pr,src;
  if(p>=900&&p<=961){r=4.65;m=4.88;pr=5.10;src="CA avg";}
  else if(p>=970&&p<=979){r=4.20;m=4.43;pr=4.65;src="OR/WA avg";}
  else if(p>=100&&p<=149){r=3.95;m=4.18;pr=4.40;src="NY avg";}
  else if(p>=600&&p<=629){r=3.75;m=3.98;pr=4.20;src="IL avg";}
  else if(p>=770&&p<=799){r=3.10;m=3.33;pr=3.55;src="TX avg";}
  else if(p>=300&&p<=319){r=3.25;m=3.48;pr=3.70;src="GA/FL avg";}
  else if(p>=480&&p<=499){r=3.40;m=3.63;pr=3.85;src="MI avg";}
  else{r=3.45;m=3.68;pr=3.90;src="national avg";}
  const prices={regular:r,midgrade:m,premium:pr,source:src};
  prices.active=prices[grade]||r;
  return prices;
}

function estimateEvRates(zip) {
  const p = parseInt((zip||"50000").substring(0,3));
  if (p>=900&&p<=961) return { home:0.25, dcFast:0.58, level2:0.38, source:"CA avg" };
  if (p>=100&&p<=149) return { home:0.21, dcFast:0.52, level2:0.34, source:"NY avg" };
  if (p>=600&&p<=629) return { home:0.16, dcFast:0.44, level2:0.30, source:"IL avg" };
  return { home:0.14, dcFast:0.42, level2:0.28, source:"national avg" };
}

function extractZip(addr) { const m=(addr||"").match(/\b(\d{5})\b/); return m?m[1]:null; }
function guessTerrainFromAddresses(addrs) {
  const j = addrs.join(" ").toLowerCase();
  if (/mountain|mt\.|ridge|peak|canyon|boulder|aspen|vail|tahoe|denver|colorado|flagstaff|reno|bozeman|salt lake/.test(j)) return "Mountainous";
  if (/hill|highland|foothills|elevation|pittsburgh|san francisco|seattle|knoxville/.test(j)) return "Hilly";
  return "Flat";
}

// ── Address Autocomplete ──────────────────────────────────────────────────────
function AddressInput({ placeholder, value, onChange, onSelect }) {
  const [suggestions, setSuggestions] = useState([]);
  const [open, setOpen] = useState(false);
  const [loading, setLoading] = useState(false);
  const timer = useRef(null);
  const ref = useRef(null);

  useEffect(() => {
    const handler = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", handler);
    return () => document.removeEventListener("mousedown", handler);
  }, []);

  function handleChange(val) {
    onChange(val);
    clearTimeout(timer.current);
    if (val.length < 4) { setSuggestions([]); setOpen(false); return; }
    timer.current = setTimeout(async () => {
      setLoading(true);
      try {
        const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&addressdetails=1&limit=5&q=${encodeURIComponent(val)}&countrycodes=us`);
        const data = await res.json();
        setSuggestions(data.map(d => ({ label: d.display_name, lat: d.lat, lon: d.lon })));
        setOpen(data.length > 0);
      } catch { setSuggestions([]); }
      setLoading(false);
    }, 400);
  }

  function pick(s) {
    onChange(s.label);
    onSelect && onSelect(s);
    setSuggestions([]); setOpen(false);
  }

  return (
    <div ref={ref} style={{position:"relative"}}>
      <div style={{position:"relative"}}>
        <input value={value} onChange={e=>handleChange(e.target.value)} placeholder={placeholder} style={IS} />
        {loading && <span className="spin" style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",fontSize:14,color:"#4f8ef7"}}>↻</span>}
      </div>
      {open && suggestions.length > 0 && (
        <div style={{position:"absolute",top:"100%",left:0,right:0,background:"#1a1d2e",border:"1px solid #2a2d3e",borderRadius:8,zIndex:999,maxHeight:220,overflowY:"auto",marginTop:2,boxShadow:"0 8px 32px rgba(0,0,0,0.5)"}}>
          {suggestions.map((s,i) => (
            <div key={i} className="autocomplete-item" onMouseDown={()=>pick(s)} style={{padding:"10px 14px",cursor:"pointer",fontSize:12,color:"#c9cdd8",borderBottom:i<suggestions.length-1?"1px solid #2a2d3e":"none"}}>
              📍 {s.label.length > 70 ? s.label.substring(0,70)+"..." : s.label}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function CarPicker({ onSelect }) {
  const [year, setYear] = useState("2022");
  const [make, setMake] = useState("");
  const [model, setModel] = useState("");
  const [era, setEra] = useState("");
  const [trim, setTrim] = useState("");

  function findEra(mk, mdl, yr) {
    if (!mk || !mdl || !DB[mk] || !DB[mk][mdl]) return "";
    const y = parseInt(yr);
    const eras = Object.keys(DB[mk][mdl]);
    for (const e of eras) {
      const parts = e.split("-");
      const lo = parseInt(parts[0]);
      const hi = parts[1] === "+" ? 9999 : parseInt(parts[1]);
      if (y >= lo && y <= hi) return e;
    }
    return eras[eras.length - 1] || "";
  }

  function getSpec(mk, mdl, er, tr) {
    return (mk && mdl && er && tr) ? (DB[mk]?.[mdl]?.[er]?.[tr] || null) : null;
  }

  const eras = (make && model && DB[make]?.[model]) ? Object.keys(DB[make][model]) : [];
  const activeEra = era || findEra(make, model, year);
  const trims = (make && model && activeEra && DB[make]?.[model]?.[activeEra])
    ? Object.keys(DB[make][model][activeEra]) : [];
  const spec = getSpec(make, model, activeEra, trim);

  // Fire onSelect whenever we have a complete valid selection
  useEffect(() => {
    if (make && model && activeEra && trim && spec) {
      onSelect({ year, make, model, era: activeEra, trim, ...spec });
    }
  }, [year, make, model, activeEra, trim]);

  function handleMake(v) { setMake(v); setModel(""); setEra(""); setTrim(""); }
  function handleModel(v) {
    setModel(v);
    setTrim("");
    const newEra = findEra(make, v, year);
    setEra(newEra);
  }
  function handleYear(v) {
    setYear(v);
    setTrim("");
    if (make && model) setEra(findEra(make, model, v));
  }
  function handleEra(v) { setEra(v); setTrim(""); }
  function handleTrim(v) {
    setTrim(v);
    // Fire immediately so there is no race condition
    const s = getSpec(make, model, era || findEra(make, model, year), v);
    if (s) onSelect({ year, make, model, era: era || findEra(make, model, year), trim: v, ...s });
  }

  return (
    <div>
      <div style={{display:"grid",gridTemplateColumns:"90px 1fr",gap:8}}>
        <div>
          <Label>Year</Label>
          <select value={year} onChange={e=>handleYear(e.target.value)} style={IS}>
            {YEARS.map(y=><option key={y}>{y}</option>)}
          </select>
        </div>
        <div>
          <Label>Make</Label>
          <select value={make} onChange={e=>handleMake(e.target.value)} style={IS}>
            <option value="">Select make…</option>
            {Object.keys(DB).sort().map(m=><option key={m}>{m}</option>)}
          </select>
        </div>
      </div>

      {make && (
        <div style={{marginTop:8}}>
          <Label>Model</Label>
          <select value={model} onChange={e=>handleModel(e.target.value)} style={IS}>
            <option value="">Select model…</option>
            {(make ? Object.keys(DB[make]||{}).sort() : []).map(m=><option key={m}>{m}</option>)}
          </select>
        </div>
      )}

      {model && eras.length > 1 && (
        <div style={{marginTop:8}}>
          <Label>Year Range <span style={{color:"#4b5563",fontWeight:400}}>(auto: {findEra(make,model,year)})</span></Label>
          <select value={activeEra} onChange={e=>handleEra(e.target.value)} style={IS}>
            {eras.map(e=><option key={e}>{e}</option>)}
          </select>
        </div>
      )}

      {model && activeEra && trims.length > 0 && (
        <div style={{marginTop:8}}>
          <Label>Trim / Engine</Label>
          <select value={trim} onChange={e=>handleTrim(e.target.value)} style={IS}>
            <option value="">Select trim…</option>
            {trims.map(t => {
              const s = DB[make]?.[model]?.[activeEra]?.[t];
              if (!s) return null;
              const label = s.type==="ev"
                ? `${t} — ⚡ ${s.range}mi range`
                : `${t} — ⛽ ${s.mpg}mpg · ${(GRADE_LABELS||{})[s.grade]||"Regular"}`;
              return <option key={t} value={t}>{label}</option>;
            })}
          </select>
        </div>
      )}

      {spec && (
        <div style={{marginTop:10,padding:"10px 14px",background:"#0f1117",borderRadius:8,fontSize:12}}>
          {spec.type==="ev"
            ? <span style={{color:"#4f8ef7"}}>⚡ EV · <b>{spec.range} mi</b> EPA range · <b>{spec.battery} kWh</b> · <b>{spec.efficiency} mi/kWh</b></span>
            : <span style={{color:"#fb923c"}}>⛽ Gas · <b>{spec.mpg} MPG</b> EPA · <b>{spec.tank} gal</b> tank · <b>{(GRADE_LABELS||{})[spec.grade]||"Regular"}</b> fuel</span>}
        </div>
      )}

      {!trim && model && activeEra && trims.length > 0 && (
        <div style={{marginTop:6,fontSize:11,color:"#6b7280",textAlign:"center"}}>↑ Select a trim to continue</div>
      )}
      {model && !activeEra && (
        <div style={{marginTop:6,fontSize:11,color:"#ef4444",textAlign:"center"}}>No data for {year} {model} — try a different year</div>
      )}
    </div>
  );
}


function SavingsChart({ carResults, annualTrips, period }) {
  const mult = period === "monthly" ? annualTrips / 12 : annualTrips;
  const data = carResults.map(r => ({
    name: r.car.name, type: r.type,
    total: (r.type==="gas" ? (r.tripCost||0) : (r.tripHome||0)) * mult,
    model: `${r.car.year} ${r.car.make} ${r.car.model}`
  }));
  const minCost = Math.min(...data.map(d=>d.total));
  const maxCost = Math.max(...data.map(d=>d.total));
  const title = period==="monthly" ? "Monthly Cost" : "Annual Cost";
  const subtitle = period==="monthly" ? `${(annualTrips/12).toFixed(1)} trips/mo` : `${annualTrips} trips/yr`;
  return (
    <div style={{background:"#1a1d2e",borderRadius:12,padding:20,border:"1px solid #2a2d3e",marginBottom:0}}>
      <div style={{fontSize:14,fontWeight:700,marginBottom:3}}>{period==="monthly"?"📅":"📆"} {title}</div>
      <div style={{fontSize:11,color:"#6b7280",marginBottom:16}}>{subtitle} · cheapest = baseline</div>
      {data.map((d,i)=>{
        const isBase=Math.abs(d.total-minCost)<0.01;
        const extra=d.total-minCost;
        const color=isBase?"#22c55e":d.type==="ev"?"#4f8ef7":"#fb923c";
        const pct=maxCost>0?(d.total/maxCost)*100:0;
        return (
          <div key={i} style={{marginBottom:16}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
              <div>
                <span style={{fontWeight:600,fontSize:12,color}}>{d.name}</span>
                <span style={{fontSize:10,color:"#6b7280",marginLeft:6}}>{d.model}</span>
              </div>
              <div style={{textAlign:"right"}}>
                <span style={{fontWeight:700,fontSize:13}}>${d.total.toFixed(0)}</span>
                {!isBase&&extra>0&&<span style={{fontSize:10,color:"#ef4444",marginLeft:5}}>+${extra.toFixed(0)}</span>}
                {isBase&&<span style={{fontSize:10,color:"#22c55e",marginLeft:5}}>&#x2B50; cheapest</span>}
              </div>
            </div>
            <div style={{height:26,background:"#0f1117",borderRadius:5,overflow:"hidden"}}>
              <div style={{height:"100%",width:`${pct}%`,background:color,borderRadius:5,minWidth:4,transition:"width 0.4s",display:"flex",alignItems:"center",paddingLeft:8}}>
                {pct>28&&<span style={{fontSize:10,fontWeight:600,color:"#fff",whiteSpace:"nowrap"}}>{d.type==="ev"?"EV":"Gas"}</span>}
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

  // Conditions
  const [season, setSeason] = useState("Summer (Jun–Aug)");
  const [tempOverride, setTempOverride] = useState("");
  const [weatherOverride, setWeatherOverride] = useState("");
  const [traffic, setTraffic] = useState("Moderate");

  const [aiText, setAiText] = useState("");
  const [aiLoading, setAiLoading] = useState(false);

  useEffect(() => { try { localStorage.setItem("tcG3", JSON.stringify(garage)); } catch {} }, [garage]);

  const allAddresses = [origin, destination, ...stops.map(s=>s.value)].filter(Boolean);
  const detectedZip = allAddresses.map(extractZip).find(Boolean) || "";
  const detectedTerrain = guessTerrainFromAddresses(allAddresses);
  const sd = SEASON_DEFAULTS[season];
  const effTemp = tempOverride || sd.tempF;
  const effWeather = weatherOverride || sd.weather;
  const annualTrips = tripsPerWeek ? Math.round(parseFloat(tripsPerWeek)*52) : null;

  // Auto-calc route when both coords set
  useEffect(() => {
    const allCoords = [originCoord, ...stops.map(s=>s.coord), destCoord].filter(Boolean);
    if (allCoords.length >= 2) {
      setRouteLoading(true);
      getRouteDistance(allCoords).then(miles => {
        if (miles) {
          const total = isRoundTrip ? miles * 2 : miles;
          setTotalMiles(total.toFixed(1));
        }
        setRouteLoading(false);
      });
    }
  }, [originCoord, destCoord, stops, isRoundTrip]);

  function addStop() { setStops(p=>[...p,{id:Date.now(),value:"",coord:null}]); }
  function removeStop(id) { setStops(p=>p.filter(s=>s.id!==id)); }
  function updateStop(id,val,coord) { setStops(p=>p.map(s=>s.id===id?{...s,value:val,coord:coord||s.coord}:s)); }

  function saveCar() {
    if (!newSpec || !newNick) return;
    const car = {
      id: Date.now(), name: newNick, fuelLevel: parseFloat(newFuel)||100,
      realWorldOverride: newRealMpg ? parseFloat(newRealMpg) : null,
      ...newSpec
    };
    setGarage(p=>[...p,car]);
    setShowAdd(false); setNewSpec(null); setNewNick(""); setNewFuel(100); setNewRealMpg("");
  }

  function toggleCar(id) { setSelectedCars(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]); }

  function calculate() {
    if (!totalMiles || selectedCars.length===0) return;
    const dist = parseFloat(totalMiles);
    const zip = detectedZip;
    const terrain = detectedTerrain;
    const evRates = estimateEvRates(zip);
    const evCalc = evRangeMult({ tempF:effTemp, terrain, traffic, weather:effWeather });
    const gasCalc = gasMpgMult({ terrain, traffic, weather:effWeather });

    const carResults = selectedCars.map(cid => {
      const car = garage.find(c=>c.id===cid);
      if (!car) return null;

      if (car.type==="gas") {
        const gasGrade = car.gasGrade || car.grade || "regular";
        const gasPrices = estimateGasPrice(zip, gasGrade);
        const baseMpg = car.realWorldOverride || car.mpg;
        const effMpg = baseMpg * gasCalc.mult;
        const gal = dist / effMpg;
        const curGal = (car.fuelLevel/100) * (car.tank||15);
        const short = Math.max(0, gal - curGal);
        const tripCost = gal * gasPrices.active;
        const cpm = tripCost / dist;
        const annual = annualTrips ? tripCost * annualTrips : null;
        const epaNote = car.realWorldOverride ? `Real-world: ${car.realWorldOverride} MPG (EPA: ${car.mpg})` : `EPA combined: ${car.mpg} MPG`;
        return { car, type:"gas", effMpg:effMpg.toFixed(1), baseMpg, gal:gal.toFixed(2), short:short.toFixed(2),
          stopNeeded:short>0, tripCost, cpm, annual, gasPrices, evRates, terrain, zip, gasGrade,
          factors:gasCalc.factors, epaNote, adjustedPct:((gasCalc.mult-1)*100).toFixed(0) };
      } else {
        const baseRange = car.range || 250;
        const adjRange = baseRange * evCalc.mult;
        const kwh = dist / ((car.efficiency||3.2) * evCalc.mult);
        const curKwh = (car.fuelLevel/100) * (car.battery||75);
        const short = Math.max(0, kwh - curKwh);
        const chStops = short>0 ? Math.ceil(short/((car.battery||75)*0.8)) : 0;
        const tripHome = kwh * evRates.home;
        const tripL2 = kwh * evRates.level2;
        const tripDC = kwh * evRates.dcFast;
        const cpm = tripHome / dist;
        const annual = annualTrips ? tripHome * annualTrips : null;
        const epaNote = `EPA range: ${baseRange} mi · Adj today: ${adjRange.toFixed(0)} mi`;
        return { car, type:"ev", adjRange:adjRange.toFixed(0), evMult:evCalc.mult, kwh:kwh.toFixed(1),
          short:short.toFixed(1), stopNeeded:short>0, chargingStops:chStops,
          tripHome, tripL2, tripDC, cpm, annual, gasPrices, evRates, terrain, zip,
          factors:evCalc.factors, epaNote, adjustedPct:((evCalc.mult-1)*100).toFixed(0) };
      }
    }).filter(Boolean);

    setResults({ carResults, dist, terrain, zip, effTemp, effWeather, traffic, annualTrips, isRoundTrip, gasPrices, evRates });
    setTab("results");
    fetchAI(carResults, dist, { season, terrain, effTemp, effWeather, traffic, zip });
  }

  async function fetchAI(carResults, dist, cond) {
    setAiLoading(true); setAiText("");
    try {
      const summary = carResults.map(r=>r.type==="gas"
        ? `${r.car.name} (${r.car.year} ${r.car.make} ${r.car.model} ${r.car.trim}, gas): $${r.tripCost.toFixed(2)}/trip, adj ${r.effMpg}mpg (base ${r.baseMpg}mpg), conditions reduced MPG by ${Math.abs(r.adjustedPct)}%`
        : `${r.car.name} (${r.car.year} ${r.car.make} ${r.car.model} ${r.car.trim}, EV): $${r.tripHome.toFixed(2)}/trip home charging, adj range ${r.adjRange}mi, conditions changed range by ${r.adjustedPct}%`
      ).join("\n");
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ model:"claude-sonnet-4-6", max_tokens:800,
          system:"You are a concise automotive cost analyst. 2-3 short paragraphs max. No markdown headers or bullets. Use specific numbers from the data. Be direct.",
          messages:[{ role:"user", content:`Trip: ${dist} miles${cond.isRoundTrip?" (round trip)":""}. ${cond.season}, ${cond.terrain} terrain, ${cond.traffic} traffic, ${cond.effWeather}, ${cond.effTemp}°F. ZIP: ${cond.zip||"unknown"}.\n\n${summary}\n\nGive a sharp cost comparison. Call out if any EV range caveats are significant. One clear recommendation at the end.` }]
        })
      });
      const d = await res.json();
      setAiText(d.content?.find(b=>b.type==="text")?.text||"");
    } catch { setAiText("AI analysis unavailable."); }
    setAiLoading(false);
  }

  const tabs = [["plan","📍 Plan Trip"],["garage",`🚗 Garage (${garage.length})`],["results","📊 Results"]];

  return (
    <div style={{minHeight:"100vh",background:"#0f1117"}}>
      {/* Header */}
      <div style={{background:"linear-gradient(135deg,#1a1d2e,#0f1117)",borderBottom:"1px solid #2a2d3e",padding:"24px 24px 0"}}>
        <div style={{maxWidth:980,margin:"0 auto"}}>
          <div style={{marginBottom:20}}>
            <div style={{fontSize:28,fontWeight:800,color:"#fff",letterSpacing:"-1px"}}><span style={{color:"#4f8ef7"}}>⚡</span> TripCost</div>
            <div style={{fontSize:13,color:"#6b7280",marginTop:3}}>Compare gas vs. EV costs under real-world conditions</div>
          </div>
          <div style={{display:"flex",gap:4}}>
            {tabs.map(([key,label])=>(
              <button key={key} onClick={()=>setTab(key)} style={{padding:"14px 28px",borderRadius:"10px 10px 0 0",border:"none",cursor:"pointer",fontSize:15,fontWeight:700,background:tab===key?"#0f1117":"#16192a",color:tab===key?"#4f8ef7":"#6b7280",borderTop:tab===key?"2px solid #4f8ef7":"2px solid transparent"}}>
                {label}
              </button>
            ))}
          </div>
        </div>
      </div>

      <div style={{maxWidth:980,margin:"0 auto",padding:"28px 16px"}}>

        {/* ── PLAN ── */}
        {tab==="plan" && (
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(300px,1fr))",gap:20}}>

            {/* Route card */}
            <div style={{gridColumn:"1 / -1"}}>
              <Card>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
                  <div>
                    <div style={{fontSize:15,fontWeight:700}}>🗺️ Trip Route</div>
                    <div style={{fontSize:12,color:"#6b7280",marginTop:2}}>Start typing an address — suggestions appear automatically</div>
                  </div>
                  <button onClick={()=>setIsRoundTrip(r=>!r)} style={{...BS, background:isRoundTrip?"#4f8ef7":"#1a2240", color:isRoundTrip?"#fff":"#4f8ef7", fontWeight:700, fontSize:12, border:`1px solid ${isRoundTrip?"#4f8ef7":"#2a2d3e"}`, whiteSpace:"nowrap"}}>
                    🔄 Round Trip {isRoundTrip?"ON":"OFF"}
                  </button>
                </div>

                <Label>Origin</Label>
                <AddressInput placeholder="e.g. 123 Main St, Chicago, IL 60601" value={origin} onChange={setOrigin} onSelect={s=>{setOrigin(s.label);setOriginCoord({lat:s.lat,lon:s.lon});}} />

                {stops.map((stop,i)=>(
                  <div key={stop.id} style={{display:"flex",gap:8,alignItems:"flex-end",marginTop:8}}>
                    <div style={{flex:1}}>
                      <Label>Stop {i+1}</Label>
                      <AddressInput placeholder="Enter stop address" value={stop.value} onChange={v=>updateStop(stop.id,v,null)} onSelect={s=>updateStop(stop.id,s.label,{lat:s.lat,lon:s.lon})} />
                    </div>
                    <button onClick={()=>removeStop(stop.id)} style={{...BS,background:"#3f1f1f",color:"#ef4444",padding:"9px 12px",marginBottom:1}}>✕</button>
                  </div>
                ))}

                <Label>Destination</Label>
                <AddressInput placeholder="e.g. 456 Oak Ave, Naperville, IL 60540" value={destination} onChange={setDestination} onSelect={s=>{setDestination(s.label);setDestCoord({lat:s.lat,lon:s.lon});}} />

                <button onClick={addStop} style={{...BS,background:"#1a2240",color:"#4f8ef7",width:"100%",marginTop:10,fontWeight:600}}>+ Add Stop</button>

                {/* Miles row */}
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginTop:16}}>
                  <div>
                    <Label>
                      Total Miles {routeLoading && <span className="spin" style={{color:"#4f8ef7",marginLeft:4}}>↻</span>}
                      {isRoundTrip && <span style={{color:"#4f8ef7",fontWeight:400,marginLeft:4}}>(round trip)</span>}
                    </Label>
                    <input type="number" placeholder={routeLoading?"Calculating…":"Enter or auto-calculated"} value={totalMiles} onChange={e=>setTotalMiles(e.target.value)} style={IS} />
                  </div>
                  <div>
                    <Label>Trips per week <span style={{color:"#4b5563",fontWeight:400}}>(optional)</span></Label>
                    <input type="number" placeholder="e.g. 5 = daily commute" value={tripsPerWeek} onChange={e=>setTripsPerWeek(e.target.value)} style={IS} />
                  </div>
                </div>

                {/* Auto-detected chips */}
                {allAddresses.length > 0 && (
                  <div style={{display:"flex",gap:8,flexWrap:"wrap",marginTop:14}}>
                    {detectedZip && <Chip color="#22c55e">📍 ZIP {detectedZip}</Chip>}
                    <Chip color="#4f8ef7">🏔️ {detectedTerrain} terrain</Chip>
                    <Chip color="#f59e0b">🌡️ {effTemp}°F</Chip>
                    <Chip color="#9ca3af">☁️ {effWeather}</Chip>
                    {annualTrips && <Chip color="#a78bfa">📅 ~{annualTrips} trips/yr</Chip>}
                    {isRoundTrip && <Chip color="#4f8ef7">🔄 Round trip</Chip>}
                  </div>
                )}
              </Card>
            </div>

            {/* Conditions */}
            <Card>
              <div style={{fontSize:15,fontWeight:700,marginBottom:4}}>🌤️ Conditions</div>
              <div style={{fontSize:12,color:"#6b7280",marginBottom:4}}>Season sets defaults — override if needed</div>
              <Label>Season</Label>
              <select value={season} onChange={e=>{setSeason(e.target.value);setTempOverride("");setWeatherOverride("");}} style={IS}>
                {SEASONS.map(s=><option key={s}>{s}</option>)}
              </select>
              <Label>Temperature °F <span style={{color:"#4b5563",fontWeight:400}}>(default: {sd.tempF}°F)</span></Label>
              <input type="number" placeholder={`Default ${sd.tempF}°F — override here`} value={tempOverride} onChange={e=>setTempOverride(e.target.value)} style={IS} />
              <Label>Weather <span style={{color:"#4b5563",fontWeight:400}}>(default: {sd.weather})</span></Label>
              <select value={effWeather} onChange={e=>setWeatherOverride(e.target.value===sd.weather?"":e.target.value)} style={IS}>
                {WEATHER_OPTIONS.map(w=><option key={w}>{w}</option>)}
              </select>
              <Label>Traffic</Label>
              <select value={traffic} onChange={e=>setTraffic(e.target.value)} style={IS}>
                {TRAFFIC_OPTIONS.map(t=><option key={t}>{t}</option>)}
              </select>
            </Card>

            {/* Select Cars */}
            <Card>
              <div style={{fontSize:15,fontWeight:700,marginBottom:4}}>🚗 Select Cars</div>
              <div style={{fontSize:12,color:"#6b7280",marginBottom:12}}>Tap to toggle for comparison</div>
              {garage.length===0
                ? <div style={{textAlign:"center",padding:"28px 0",color:"#4b5563"}}>No cars yet.<br/>Go to <b>Garage</b> to add vehicles.</div>
                : garage.map(car=>(
                  <div key={car.id} onClick={()=>toggleCar(car.id)} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 14px",borderRadius:8,marginBottom:8,cursor:"pointer",background:selectedCars.includes(car.id)?"#1a2240":"#16192a",border:`1px solid ${selectedCars.includes(car.id)?"#4f8ef7":"#2a2d3e"}`,transition:"all 0.15s"}}>
                    <span style={{fontSize:18}}>{car.type==="ev"?"⚡":"⛽"}</span>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:600,fontSize:13}}>{car.name}</div>
                      <div style={{fontSize:11,color:"#9ca3af"}}>{car.year} {car.make} {car.model} · {car.trim} · {car.fuelLevel}% {car.type==="ev"?"charge":"fuel"}</div>
                    </div>
                    <div style={{width:20,height:20,borderRadius:"50%",border:`2px solid ${selectedCars.includes(car.id)?"#4f8ef7":"#4b5563"}`,background:selectedCars.includes(car.id)?"#4f8ef7":"transparent",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:"#fff",flexShrink:0}}>{selectedCars.includes(car.id)?"✓":""}</div>
                  </div>
                ))
              }
            </Card>

            {/* Calculate */}
            <div style={{gridColumn:"1 / -1"}}>
              <button onClick={calculate} disabled={!totalMiles||selectedCars.length===0} style={{width:"100%",padding:16,borderRadius:12,border:"none",cursor:(!totalMiles||selectedCars.length===0)?"not-allowed":"pointer",background:(!totalMiles||selectedCars.length===0)?"#1e2130":"linear-gradient(135deg,#4f8ef7,#7c3aed)",color:(!totalMiles||selectedCars.length===0)?"#4b5563":"#fff",fontSize:17,fontWeight:800}}>
                {!totalMiles?"Enter miles or pick addresses to auto-calculate":selectedCars.length===0?"Select at least one car from Garage":"Calculate Trip Costs →"}
              </button>
            </div>
          </div>
        )}

        {/* ── GARAGE ── */}
        {tab==="garage" && (
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
              <div>
                <div style={{fontSize:18,fontWeight:700}}>My Garage</div>
                <div style={{fontSize:13,color:"#6b7280"}}>Save vehicles for quick comparisons</div>
              </div>
              <button onClick={()=>setShowAdd(true)} style={{...BS,background:"#4f8ef7",color:"#fff",fontWeight:700,fontSize:14}}>+ Add Vehicle</button>
            </div>

            {garage.length===0 && <div style={{textAlign:"center",padding:"60px 0",color:"#4b5563"}}><div style={{fontSize:52}}>🚗</div><div style={{fontSize:16,fontWeight:700,marginTop:14,color:"#6b7280"}}>Garage is empty</div><div style={{fontSize:13,marginTop:6}}>Add your vehicles to start comparing trips</div></div>}

            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(250px,1fr))",gap:16}}>
              {garage.map(car=>(
                <Card key={car.id}>
                  <div style={{display:"flex",justifyContent:"space-between"}}>
                    <span style={{fontSize:28}}>{car.type==="ev"?"⚡":"⛽"}</span>
                    <button onClick={()=>setGarage(g=>g.filter(c=>c.id!==car.id))} style={{background:"none",border:"none",color:"#4b5563",cursor:"pointer",fontSize:18}}>✕</button>
                  </div>
                  <div style={{fontWeight:700,fontSize:15,marginTop:8}}>{car.name}</div>
                  <div style={{fontSize:11,color:"#9ca3af",marginBottom:12}}>{car.year} {car.make} {car.model}<br/>{car.trim}</div>
                  <Row label={car.type==="ev"?"EPA Range":"EPA MPG"} value={car.type==="ev"?`${car.range} mi`:`${car.mpg} mpg`} />
                  {car.realWorldOverride && <Row label="Real-world MPG" value={`${car.realWorldOverride} mpg ✓`} bold />}
                  <Row label={car.type==="ev"?"Battery":"Tank"} value={car.type==="ev"?`${car.battery} kWh`:`${car.tank} gal`} />
                  <Row label="Current level" value={`${car.fuelLevel}%`} />
                  <div style={{marginTop:8,height:6,borderRadius:3,background:"#2a2d3e"}}>
                    <div style={{width:`${car.fuelLevel}%`,height:"100%",borderRadius:3,background:car.fuelLevel>50?"#22c55e":car.fuelLevel>25?"#fb923c":"#ef4444"}} />
                  </div>
                </Card>
              ))}
            </div>

            {showAdd && (
              <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200}}>
                <div style={{background:"#1a1d2e",borderRadius:16,padding:28,width:"min(540px,94vw)",border:"1px solid #2a2d3e",maxHeight:"90vh",overflowY:"auto"}}>
                  <div style={{fontSize:17,fontWeight:700,marginBottom:20}}>Add Vehicle</div>
                  <CarPicker onSelect={spec=>setNewSpec(spec)} />
                  <Label>Nickname</Label>
                  <input placeholder='e.g. "My Truck", "Wife&apos;s Tesla"' value={newNick} onChange={e=>setNewNick(e.target.value)} style={IS} />
                  <Label>Current fuel / charge level (%)</Label>
                  <input type="number" min="0" max="100" value={newFuel} onChange={e=>setNewFuel(e.target.value)} style={IS} />
                  <div style={{marginTop:6,height:6,borderRadius:3,background:"#2a2d3e"}}>
                    <div style={{width:`${Math.min(100,Math.max(0,newFuel))}%`,height:"100%",borderRadius:3,background:newFuel>50?"#22c55e":newFuel>25?"#fb923c":"#ef4444",transition:"width 0.2s"}} />
                  </div>
                  {newSpec?.type==="gas" && (
                    <>
                      <Label>Real-world MPG <span style={{color:"#4b5563",fontWeight:400}}>(optional — overrides EPA estimate)</span></Label>
                      <input type="number" placeholder={`EPA: ${newSpec?.mpg} MPG — enter yours if you track it`} value={newRealMpg} onChange={e=>setNewRealMpg(e.target.value)} style={IS} />
                    </>
                  )}
                  <div style={{display:"flex",gap:10,marginTop:20}}>
                    <button onClick={()=>{setShowAdd(false);setNewSpec(null);setNewNick("");setNewFuel(100);setNewRealMpg("");}} style={{...BS,flex:1,background:"#1e2130",color:"#9ca3af"}}>Cancel</button>
                    <button onClick={saveCar} disabled={!newSpec||!newNick} style={{...BS,flex:1,background:(!newSpec||!newNick)?"#1e2130":"#4f8ef7",color:(!newSpec||!newNick)?"#4b5563":"#fff",fontWeight:700}}>
                      Save Vehicle
                    </button>
                  </div>
                  {!newSpec && <div style={{marginTop:10,fontSize:11,color:"#6b7280",textAlign:"center"}}>Select Year → Make → Model → Trim to continue</div>}
                </div>
              </div>
            )}
          </div>
        )}

        {/* ── RESULTS ── */}
        {tab==="results" && (
          <div>
            {!results ? (
              <div style={{textAlign:"center",padding:"60px 0",color:"#4b5563"}}><div style={{fontSize:52}}>📊</div><div style={{fontSize:16,fontWeight:700,marginTop:14,color:"#6b7280"}}>No results yet</div><div style={{fontSize:13,marginTop:6}}>Plan a trip and hit Calculate</div></div>
            ) : (
              <div>
                <div style={{marginBottom:20}}>
                  <div style={{fontSize:18,fontWeight:700}}>Trip Results {results.isRoundTrip?"(Round Trip)":""}</div>
                  <div style={{fontSize:13,color:"#6b7280",marginTop:3}}>
                    {results.dist} miles · {season} · {results.terrain} · {results.traffic} traffic · {results.effWeather} · {results.effTemp}°F{results.zip?` · ZIP ${results.zip}`:""}
                  </div>
                </div>

                {/* Car result cards */}
                <div style={{display:"grid",gridTemplateColumns:`repeat(${Math.min(results.carResults.length,3)},1fr)`,gap:16,marginBottom:20}}>
                  {results.carResults.map((r,i)=>{
                    const cost = r.type==="gas"?r.tripCost:r.tripHome;
                    const lowest = Math.min(...results.carResults.map(x=>x.type==="gas"?x.tripCost:x.tripHome));
                    const isWinner = results.carResults.length>1 && Math.abs(cost-lowest)<0.01;
                    return (
                      <div key={i} style={{background:isWinner?"linear-gradient(135deg,#1a2a1a,#111418)":"#1e2130",border:`1px solid ${isWinner?"#22c55e":"#2a2d3e"}`,borderRadius:14,padding:"18px 16px",position:"relative"}}>
                        {isWinner && <div style={{position:"absolute",top:-11,right:14,background:"#22c55e",color:"#000",fontSize:10,fontWeight:800,padding:"3px 10px",borderRadius:20}}>CHEAPEST</div>}
                        <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:10}}>
                          <span style={{fontSize:20}}>{r.type==="ev"?"⚡":"⛽"}</span>
                          <div>
                            <div style={{fontWeight:700,fontSize:14}}>{r.car.name}</div>
                            <div style={{fontSize:10,color:"#9ca3af"}}>{r.car.year} {r.car.make} {r.car.model} · {r.car.trim}</div>
                          </div>
                        </div>
                        <div style={{fontSize:36,fontWeight:800,letterSpacing:"-1.5px",color:isWinner?"#4ade80":"#fff",lineHeight:1}}>{fmt$(cost)}</div>
                        <div style={{fontSize:11,color:"#6b7280",marginBottom:14}}>per trip · {r.type==="ev"?"home charging":"regular gas"}</div>

                        <Row label="Cost per mile" value={fmt$(r.cpm)} bold />
                        {r.annual!==null && <Row label={`Annual (${results.annualTrips} trips)`} value={`$${r.annual.toFixed(0)}`} bold />}
                        <div style={{borderTop:"1px solid #2a2d3e",margin:"10px 0"}} />

                        {r.type==="gas" && <>
                          <Row label="Effective MPG" value={`${r.effMpg} mpg`} />
                          <Row label="Gallons needed" value={`${r.gal} gal`} />
                          <Row label="Regular" value={fmt$(r.gasPrices.regular)+"/gal · "+fmt$(parseFloat(r.gal)*r.gasPrices.regular)+" trip"} sub />
                          <Row label="Mid-Grade" value={fmt$(r.gasPrices.midgrade||r.gasPrices.regular)+"/gal · "+fmt$(parseFloat(r.gal)*(r.gasPrices.midgrade||r.gasPrices.regular))+" trip"} sub />
                          <Row label="Premium" value={fmt$(r.gasPrices.premium)+"/gal · "+fmt$(parseFloat(r.gal)*r.gasPrices.premium)+" trip"} sub />
                          <div style={{marginTop:8,display:"flex",gap:4,flexWrap:"wrap"}}>
                            <span style={{fontSize:10,color:"#6b7280",alignSelf:"center",marginRight:2}}>Switch grade:</span>
                            {["regular","midgrade","premium"].map(g=>(
                              <button key={g} onClick={(e)=>{e.stopPropagation();
                                const upd={...results};
                                const cr=upd.carResults[i];
                                cr.gasGrade=g;
                                cr.gasPrices.active=cr.gasPrices[g]||cr.gasPrices.regular;
                                cr.tripCost=parseFloat(cr.gal)*(cr.gasPrices[g]||cr.gasPrices.regular);
                                cr.cpm=cr.tripCost/results.dist;
                                if(results.annualTrips) cr.annual=cr.tripCost*results.annualTrips;
                                setResults({...upd});
                              }} style={{padding:"4px 8px",borderRadius:6,border:"none",cursor:"pointer",fontSize:10,fontWeight:700,
                                background:(r.gasGrade||"regular")===g?"#fb923c":"#1a1d2e",
                                color:(r.gasGrade||"regular")===g?"#000":"#9ca3af"}}>
                                {(GRADE_LABELS||{})[g]||g}
                              </button>
                            ))}
                          </div>
                        </>}
                        {r.type==="ev" && <>
                          <Row label="Adj. range today" value={`${r.adjRange} mi`} />
                          <Row label="Range impact" value={`${r.adjustedPct}%`} highlight={r.evMult<0.80} />
                          <Row label="kWh needed" value={`${r.kwh} kWh`} />
                          <Row label="Public L2 total" value={fmt$(r.tripL2)} sub />
                          <Row label="DC Fast total" value={fmt$(r.tripDC)} sub />
                        </>}

                        {r.stopNeeded && <div style={{marginTop:10,padding:"9px 12px",background:"#2a1a00",borderRadius:8,color:"#fb923c",fontSize:12,fontWeight:600}}>{r.type==="gas"?`⚠️ Need ~${r.short} more gal — gas stop required`:`⚠️ Need ~${r.short} more kWh — ${r.chargingStops} charging stop(s)`}</div>}

                        {/* Accuracy breakdown button */}
                        <button onClick={()=>setShowBreakdown(showBreakdown===i?null:i)} style={{...BS,width:"100%",marginTop:12,background:"#1a1d2e",color:"#6b7280",fontSize:11,border:"1px solid #2a2d3e"}}>
                          {showBreakdown===i?"▲ Hide":"▼ How we calculated this"}
                        </button>

                        {showBreakdown===i && (
                          <div style={{marginTop:10,padding:"12px",background:"#0f1117",borderRadius:8,fontSize:11}}>
                            <div style={{color:"#4f8ef7",fontWeight:700,marginBottom:8}}>📊 Accuracy Breakdown</div>
                            <div style={{color:"#9ca3af",marginBottom:6}}>{r.epaNote}</div>
                            {r.factors.length > 0 ? (
                              r.factors.map((f,fi)=><div key={fi} style={{color:"#6b7280",marginBottom:3}}>• {f}</div>)
                            ) : <div style={{color:"#6b7280"}}>• No significant condition adjustments</div>}
                            <div style={{borderTop:"1px solid #2a2d3e",marginTop:8,paddingTop:8,color:r.adjustedPct<0?"#ef4444":"#4ade80",fontWeight:600}}>
                              Net adjustment: {r.adjustedPct}% from EPA baseline
                            </div>
                            <div style={{marginTop:6,color:"#4b5563",fontSize:10}}>
                              Gas prices: {r.gasPrices.source} · EV rates: {r.evRates?.source||"national avg"}
                            </div>
                            {r.car.realWorldOverride && <div style={{marginTop:4,color:"#4ade80",fontSize:10}}>✓ Using your real-world {r.car.realWorldOverride} MPG (not EPA)</div>}
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>

                {/* Savings callout */}
                {results.carResults.length>=2 && (()=>{
                  const sorted=[...results.carResults].map(r=>({name:r.car.name,cost:r.type==="gas"?r.tripCost:r.tripHome,annual:r.annual})).sort((a,b)=>a.cost-b.cost);
                  const saved=sorted[sorted.length-1].cost-sorted[0].cost;
                  if(saved<0.01) return null;
                  const annSaved=sorted[0].annual!==null&&sorted[sorted.length-1].annual!==null?sorted[sorted.length-1].annual-sorted[0].annual:null;
                  return (
                    <div style={{background:"linear-gradient(135deg,#1a2240,#0f1117)",border:"1px solid #4f8ef7",borderRadius:12,padding:"16px 20px",marginBottom:20,display:"flex",gap:24,flexWrap:"wrap",alignItems:"center"}}>
                      <div><div style={{fontSize:28,fontWeight:800,color:"#4f8ef7",letterSpacing:"-1px"}}>{fmt$(saved)}</div><div style={{fontSize:12,color:"#6b7280"}}>saved per trip with {sorted[0].name}</div></div>
                      {annSaved!==null&&<div><div style={{fontSize:28,fontWeight:800,color:"#4f8ef7",letterSpacing:"-1px"}}>${annSaved.toFixed(0)}</div><div style={{fontSize:12,color:"#6b7280"}}>annual savings ({results.annualTrips} trips/yr)</div></div>}
                    </div>
                  );
                })()}

                {/* Savings graphs */}
                {results.annualTrips && results.carResults.length >= 1 && (
                  <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(280px,1fr))",gap:16,marginBottom:20}}>
                    <SavingsChart carResults={results.carResults} annualTrips={results.annualTrips} period="monthly" />
                    <SavingsChart carResults={results.carResults} annualTrips={results.annualTrips} period="yearly" />
                  </div>
                )}
                {/* AI */}
                <Card>
                  <div style={{fontSize:13,fontWeight:700,color:"#4f8ef7",marginBottom:10}}>⚡ AI Analysis</div>
                  {aiLoading?<div style={{color:"#6b7280",fontSize:13}}>Analyzing your trip…</div>
                    :<div style={{fontSize:13,lineHeight:1.75,color:"#c9cdd8",whiteSpace:"pre-wrap"}}>{aiText||"—"}</div>}
                </Card>
              </div>
            )}
          </div>
        )}
      </div>

      <div style={{textAlign:"center",padding:"20px",borderTop:"1px solid #1e2130",color:"#374151",fontSize:11}}>
        Estimates use EPA ratings adjusted for real-world conditions. Actual costs will vary. · Routing via OpenStreetMap
      </div>
    </div>
  );
}

function Chip({children,color}) {
  return <div style={{display:"inline-flex",alignItems:"center",padding:"4px 10px",borderRadius:20,background:"#1e2130",border:`1px solid ${color}33`,color:color,fontSize:11,fontWeight:600}}>{children}</div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
